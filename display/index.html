<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GigDash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <h1 class="name"><span class="name-logo" role="img" aria-label="Doug McArthur"></span></h1>
    <a class="qr-link" href="https://links.dougmcarthur.net" aria-label="links.dougmcarthur.net">
      <div class="qr-card">
        <img class="qr" src="assets/qr.svg" alt="QR code for links.dougmcarthur.net">
      </div>
    </a>
  </main>
  <script>
    // Logo animation variant, switchable for preview: ?logo=sheen|breathe|glow|none
    const variants = ['sheen', 'breathe', 'glow', 'none'];
    const requested = new URLSearchParams(location.search).get('logo');
    document.body.dataset.logo = variants.includes(requested) ? requested : 'sheen';
  </script>
</body>
</html>
