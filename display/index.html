<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GigDash</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <h1 class="name"><span class="name-logo" role="img" aria-label="Doug McArthur"></span></h1>
    <a class="qr-link" href="https://links.dougmcarthur.net" aria-label="links.dougmcarthur.net">
      <div class="qr-card">
        <img class="qr" src="assets/qr.svg" alt="QR code for links.dougmcarthur.net">
        <span class="sparkle sparkle-1"></span>
        <span class="sparkle sparkle-2"></span>
        <span class="sparkle sparkle-3"></span>
        <span class="sparkle sparkle-4"></span>
      </div>
    </a>
  </main>
  <script>
    // Logo animation variant, switchable for preview: ?logo=sheen|breathe|glow|none
    const variants = ['sheen', 'breathe', 'glow', 'none'];
    const requested = new URLSearchParams(location.search).get('logo');
    document.body.dataset.logo = variants.includes(requested) ? requested : 'sheen';

    // QR accent variant, switchable for preview: ?qr=pulse|ring|sparkle|none
    const qrVariants = ['pulse', 'ring', 'sparkle', 'border', 'none'];
    const requestedQr = new URLSearchParams(location.search).get('qr');
    document.body.dataset.qr = qrVariants.includes(requestedQr) ? requestedQr : 'ring';
  </script>
</body>
</html>
