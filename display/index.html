<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GigDash</title>
<!-- Web app manifest + Apple meta tags: on iPad, Safari won't put an
     arbitrary element into true fullscreen, so the reliable path is
     "Share → Add to Home Screen", which launches this page standalone
     (no browser chrome) thanks to display:fullscreen below. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0d12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GigDash">
<link rel="apple-touch-icon" href="assets/logo.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <button type="button" class="fullscreen-toggle" aria-label="Toggle fullscreen" hidden>
    <span class="fullscreen-toggle-enter" aria-hidden="true">⤢</span>
    <span class="fullscreen-toggle-exit" aria-hidden="true">⤡</span>
  </button>
  <main class="stage">
    <h1 class="name"><span class="name-logo" role="img" aria-label="Doug McArthur"></span></h1>
    <div class="card-carousel"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
